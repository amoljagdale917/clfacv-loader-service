spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: jdbc:oracle:thin:@//prod-host:1521/PRODDB
    username: prod_user
    password: prod_password
    driver-class-name: oracle.jdbc.OracleDriver

app:
  loader:
    scheduler:
      # Midnight daily
      cron: "0 0 0 * * *"
    input-directory: lms/files/input
    success-directory: lms/files/success
    failed-directory: lms/files/failed
    input-charset: UTF-8
    batch-size: 500
    files:
      - file-name: CLFACV.TXT
        table-name: STG_HK_OBS_FACVDW
      - file-name: CLFACVHASE.TXT
        table-name: STG_HK_OBS_FACVDW
      - file-name: CLIMTM.TXT
        table-name: STG_HK_OBS_IMTM
