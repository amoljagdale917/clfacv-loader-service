spring.application.name=clfacv-loader

# Oracle datasource (update values as per your environment)
spring.datasource.url=jdbc:oracle:thin:@//localhost:1521/XEPDB1
spring.datasource.username=your_username
spring.datasource.password=your_password
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# Scheduler (every 5 minutes by default)
app.scheduler.cron=0 0/5 * * * *

# Input file settings
app.input.directory=lms/file/input
app.input.files=CLFACV.TXT,CLFACVHASE.TXT
app.input.charset=UTF-8

# JDBC batch size
app.db.batch-size=500
