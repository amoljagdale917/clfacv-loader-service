spring.application.name=clfacv-loader

# Shared defaults. Environment-specific datasource lives in:
# - application-postprod.yml
# - application-prod.yml
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# Scheduler (every 5 minutes by default)
app.scheduler.cron=0 0/5 * * * *

# Input file settings
app.input.directory=lms/file/input
app.input.files=CLFACV.TXT,CLFACVHASE.TXT
app.input.charset=UTF-8

# JDBC batch size
app.db.batch-size=500
