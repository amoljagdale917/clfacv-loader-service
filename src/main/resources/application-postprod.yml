spring:
  config:
    activate:
      on-profile: postprod
  datasource:
    url: jdbc:oracle:thin:@//localhost:1521/XEPDB1
    username: system
    password: System@123
    driver-class-name: oracle.jdbc.OracleDriver

app:
  loader:
    scheduler:
      # Test schedule (change as needed)
      cron: "0 0/2 * * * *"
    input-directory: ${user.home}/Documents/hub/var/incoming
    success-directory: ${user.home}/Documents/hub/var/success
    failed-directory: ${user.home}/Documents/hub/var/failed
    input-charset: UTF-8
    batch-size: 500
    files:
      - file-name: CLFACV.TXT
        data-source: primary
        table-name: STG_HK_OBS_FACV
        columns:
          - name: BNK_NO
            length: 3
          - name: CUST_ACCT_NO
            length: 12
          - name: SYS_COD
            length: 3
          - name: REC_TYPE
            length: 1
          - name: CUST_GP
            length: 1
          - name: ITL_CUST_NO
            length: 11
          - name: FILLER
            length: 11
          - name: LMT_ID
            length: 5
          - name: CUST_ID
            length: 11
          - name: FILLER1
            length: 7
          - name: MAINT_ACT
            length: 1
      - file-name: CLFACVHASE.TXT
        data-source: primary
        table-name: STG_HK_OBS_FACV
        columns:
          - name: BNK_NO
            length: 3
          - name: CUST_ACCT_NO
            length: 12
          - name: SYS_COD
            length: 3
          - name: REC_TYPE
            length: 1
          - name: CUST_GP
            length: 1
          - name: ITL_CUST_NO
            length: 11
          - name: FILLER
            length: 11
          - name: LMT_ID
            length: 5
          - name: CUST_ID
            length: 11
          - name: FILLER1
            length: 7
          - name: MAINT_ACT
            length: 1
